<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>H Terminals | Ultimate OS</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/xterm@5.3.0/css/xterm.css" />
    <script src="https://cdn.jsdelivr.net/npm/xterm@5.3.0/lib/xterm.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/xterm-addon-fit@0.8.0/lib/xterm-addon-fit.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.5.0/dist/echarts.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/require.js/2.3.6/require.min.js"></script>
    <style>
        :root { --bg: #111b15; --panel: #1a231c; --border: #2c3c31; --text: #a0c2a8; --accent: #00ff66; }
        body { margin: 0; background: var(--bg); color: var(--text); font-family: 'Segoe UI', Consolas, monospace; height: 100vh; overflow: hidden; display: flex; flex-direction: column; }
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-thumb { background: #3c4c41; border-radius: 3px; }
        
        .header { height: 45px; background: #0a120c; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; padding: 0 20px; }
        .header .logo { color: var(--accent); font-weight: bold; font-size: 16px; text-shadow: 0 0 10px rgba(0,255,102,0.3); }
        
        .desktop { flex: 1; display: grid; grid-template-columns: 220px 1fr 280px; overflow: hidden; }
        .panel { background: var(--panel); border-right: 1px solid var(--border); display: flex; flex-direction: column; }
        .panel-title { padding: 8px 15px; font-size: 12px; font-weight: bold; background: #141c16; border-bottom: 1px solid var(--border); color: #fff; display: flex; justify-content: space-between;}
        
        /* 文件树 */
        #fileManager { flex: 1; overflow-y: auto; padding: 5px; font-size: 13px; }
        .file-item { padding: 6px 10px; cursor: pointer; border-radius: 4px; display: flex; align-items: center; gap: 8px; }
        .file-item:hover { background: rgba(0, 255, 102, 0.1); color: var(--accent); }
        .icon-dir { color: #dcb67a; }
        .icon-file { color: #888; }

        /* 中部双分屏 */
        .main-area { display: grid; grid-template-rows: 55% 45%; border-right: 1px solid var(--border); }
        .editor-container { position: relative; width: 100%; height: 100%; overflow: hidden; }
        #terminalWrapper { flex: 1; padding: 5px 10px; background: #000; overflow: hidden; }
        
        /* 仪表盘 */
        .dashboard { padding: 15px; overflow-y: auto; display: flex; flex-direction: column; gap: 20px;}
        .chart-box { height: 180px; width: 100%; }

        /* 极客风登录框 */
        #loginOverlay { position: absolute; inset: 0; background: rgba(0,0,0,0.85); backdrop-filter: blur(5px); display: flex; justify-content: center; align-items: center; z-index: 999; transition: opacity 0.3s; }
        .login-box { background: #161e18; border: 1px solid var(--accent); padding: 30px; width: 400px; border-radius: 8px; box-shadow: 0 0 30px rgba(0,255,102,0.1); display: grid; gap: 15px; }
        input, textarea { background: #0a120c; color: #fff; border: 1px solid #3c4c41; padding: 10px; border-radius: 4px; font-family: monospace; outline: none;}
        input:focus, textarea:focus { border-color: var(--accent); }
        textarea { height: 80px; resize: vertical; }
        button { background: var(--accent); color: #000; border: none; padding: 12px; cursor: pointer; font-weight: bold; border-radius: 4px; transition: 0.2s;}
        button:hover { background: #00cc52; box-shadow: 0 0 15px rgba(0,255,102,0.4);}
    </style>
</head>
<body>
    <div id="loginOverlay">
        <div class="login-box">
            <h2 style="margin:0 0 10px 0; color:#fff;">系统直连凭证</h2>
            <div style="display: flex; gap: 10px;">
                <input type="text" id="host" placeholder="Server IP" value="" style="flex: 1;">
                <input type="number" id="port" placeholder="Port" value="22" style="width: 80px;">
            </div>
            <input type="text" id="user" placeholder="Username" value="root">
            <input type="password" id="pass" placeholder="Password (或私钥密码)">
            <textarea id="key" placeholder="在此粘贴私钥 (-----BEGIN OPENSSH PRIVATE KEY-----)&#10;留空则使用上方密码登录"></textarea>
            <button id="connectBtn" onclick="connectEngine()">⚡ 建立满血连接</button>
        </div>
    </div>

    <div class="header">
        <div class="logo">🚀 WebSSH | Master OS</div>
        <div style="font-size: 12px; color: #888;">System Uptime: <span style="color:var(--accent)">Running</span></div>
    </div>
    
    <div class="desktop">
        <div class="panel">
            <div class="panel-title"><span>📁 /root</span> <span>🔄</span></div>
            <div id="fileManager"></div>
        </div>

        <div class="main-area">
            <div class="panel" style="border-bottom: 2px solid var(--border);">
                <div class="panel-title"><span>📝 Code Editor (Monaco)</span> <span>Save (Ctrl+S)</span></div>
                <div class="editor-container" id="editorArea"></div>
            </div>
            <div class="panel">
                <div class="panel-title"><span>🖥️ Terminal</span> <span>bash</span></div>
                <div id="terminalWrapper"></div>
            </div>
        </div>

        <div class="panel">
            <div class="panel-title">📊 性能态势感知</div>
            <div class="dashboard">
                <div id="gaugeChart" class="chart-box"></div>
                <div id="netChart" class="chart-box" style="height: 220px;"></div>
            </div>
        </div>
    </div>

    <script>
        // ================= 1. 初始化 Monaco Editor =================
        let monacoEditor;
        require.config({ paths: { 'vs': 'https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.39.0/min/vs' }});
        require(['vs/editor/editor.main'], function() {
            monacoEditor = monaco.editor.create(document.getElementById('editorArea'), {
                value: "// 选中左侧文件以在此处编辑...\n\nfunction init() {\n  console.log('Engine Ready!');\n}",
                language: 'javascript',
                theme: 'vs-dark',
                automaticLayout: true,
                minimap: { enabled: false }
            });
        });

        // ================= 2. 初始化 xterm.js =================
        const term = new Terminal({ cursorBlink: true, theme: { background: '#000', foreground: '#a0c2a8' }, fontFamily: 'Consolas' });
        const fitAddon = new FitAddon.FitAddon();
        term.loadAddon(fitAddon);
        term.open(document.getElementById('terminalWrapper'));
        setTimeout(() => fitAddon.fit(), 100);
        window.addEventListener('resize', () => fitAddon.fit());

        // ================= 3. 初始化 ECharts 仪表盘 =================
        const gaugeChart = echarts.init(document.getElementById('gaugeChart'), 'dark');
        const netChart = echarts.init(document.getElementById('netChart'), 'dark');
        
        gaugeChart.setOption({
            backgroundColor: 'transparent',
            series: [
                { type: 'gauge', center: ['25%', '50%'], radius: '80%', progress: { show: true, width: 8 }, axisLine: { lineStyle: { width: 8 } }, axisTick: { show: false }, splitLine: { show: false }, axisLabel: { show: false }, pointer: { show: false }, detail: { valueAnimation: true, fontSize: 14, color: '#fff', formatter: '{value}%' }, data: [{ value: 0, name: 'CPU' }], title: { fontSize: 12, offsetCenter: [0, '80%'] } },
                { type: 'gauge', center: ['75%', '50%'], radius: '80%', progress: { show: true, width: 8, itemStyle: { color: '#007acc' } }, axisLine: { lineStyle: { width: 8 } }, axisTick: { show: false }, splitLine: { show: false }, axisLabel: { show: false }, pointer: { show: false }, detail: { valueAnimation: true, fontSize: 14, color: '#fff', formatter: '{value}%' }, data: [{ value: 0, name: 'RAM' }], title: { fontSize: 12, offsetCenter: [0, '80%'] } }
            ]
        });

        const timeData = Array(20).fill('');
        const rxData = Array(20).fill(0);
        netChart.setOption({
            backgroundColor: 'transparent',
            title: { text: 'Network Traffic (KB/s)', textStyle: { fontSize: 12, color: '#888' } },
            grid: { left: 30, right: 10, bottom: 20, top: 40 },
            xAxis: { type: 'category', boundaryGap: false, data: timeData, show: false },
            yAxis: { type: 'value', splitLine: { lineStyle: { color: '#2c3c31' } } },
            series: [{ type: 'line', data: rxData, areaStyle: { color: 'rgba(0, 255, 102, 0.2)' }, itemStyle: { color: '#00ff66' }, smooth: true }]
        });

        // ================= 4. WebSocket 核心引擎 =================
        let ws = null;

        function connectEngine() {
            const host = document.getElementById('host').value.trim();
            if(!host) { alert('请输入 IP 地址'); return; }

            // 隐藏登录框
            document.getElementById('loginOverlay').style.opacity = '0';
            setTimeout(() => document.getElementById('loginOverlay').style.display = 'none', 300);
            
            term.reset();
            term.writeln('\x1b[33m[Engine]\x1b[0m 正在打通 OS 底层协议簇...');

            ws = new WebSocket(window.location.protocol === 'https:' ? 'wss://' : 'ws://' + window.location.host + '/');
            
            term.onData(data => { 
                if(ws.readyState === WebSocket.OPEN) ws.send(JSON.stringify({ type: 'TERMINAL_INPUT', data })); 
            });

            ws.onopen = () => {
                // 动态构建认证凭据（支持密码与私钥）
                const creds = {
                    host: host,
                    port: parseInt(document.getElementById('port').value) || 22,
                    username: document.getElementById('user').value
                };
                
                const pass = document.getElementById('pass').value;
                const key = document.getElementById('key').value.trim();

                if (key) {
                    creds.privateKey = key;
                    if (pass) creds.passphrase = pass; // 如果私钥有密码保护
                } else {
                    creds.password = pass;
                }

                ws.send(JSON.stringify(creds));
            };

            ws.onmessage = (e) => {
                const packet = JSON.parse(e.data);
                
                // OS 级事件路由
                if (packet.type === 'TERMINAL') {
                    term.write(packet.data);
                } 
                else if (packet.type === 'SFTP_TREE') {
                    const html = packet.files.map(f => {
                        const icon = f.isDir ? '<span class="icon-dir">📁</span>' : '<span class="icon-file">📄</span>';
                        return `<div class="file-item" onclick="openFile('${f.name}')">${icon} ${f.name}</div>`;
                    }).join('');
                    document.getElementById('fileManager').innerHTML = html;
                }
                else if (packet.type === 'MONITOR') {
                    gaugeChart.setOption({ series: [{ data: [{ value: packet.cpu.toFixed(1), name: 'CPU' }] }, { data: [{ value: packet.mem.toFixed(1), name: 'RAM' }] }] });
                    rxData.shift(); rxData.push(packet.net);
                    netChart.setOption({ series: [{ data: rxData }] });
                }
            };

            // 【核心修复】：连接断开或报错时，重弹登录框
            ws.onclose = () => { 
                term.writeln('\r\n\x1b[31m[System]\x1b[0m 管道已断开，请检查网络或认证凭据。'); 
                showLoginBox();
            };
            ws.onerror = () => { 
                term.writeln('\r\n\x1b[31m[System]\x1b[0m 建立 WebSocket 隧道失败。'); 
                showLoginBox();
            };
        }

        function showLoginBox() {
            document.getElementById('loginOverlay').style.display = 'flex';
            setTimeout(() => document.getElementById('loginOverlay').style.opacity = '1', 50);
        }

        // 模拟文件点击事件
        window.openFile = function(filename) {
            if(monacoEditor) {
                monacoEditor.setValue(`// 当前编辑文件: /root/${filename}\n\n// 提示：完整版需在此处向后端请求文件流并渲染...`);
            }
        };
    </script>
</body>
</html>
