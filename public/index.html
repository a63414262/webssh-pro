<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WebSSH | Ultimate OS</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/xterm@5.3.0/css/xterm.css" />
    <script src="https://cdn.jsdelivr.net/npm/xterm@5.3.0/lib/xterm.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/xterm-addon-fit@0.8.0/lib/xterm-addon-fit.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.5.0/dist/echarts.min.js"></script>
    <style>
        :root { --bg: #1e1e1e; --panel: #252526; --border: #333; --text: #ccc; }
        body { margin: 0; background: var(--bg); color: var(--text); font-family: Consolas, monospace; height: 100vh; overflow: hidden; display: flex; flex-direction: column; }
        .header { height: 40px; background: #333; display: flex; align-items: center; padding: 0 15px; font-weight: bold; color: #fff; }
        .desktop { flex: 1; display: grid; grid-template-columns: 200px 1fr 250px; overflow: hidden; }
        
        /* 模块面板基础样式 */
        .panel { background: var(--panel); border: 1px solid var(--border); display: flex; flex-direction: column; overflow: hidden; }
        .panel-title { padding: 5px 10px; font-size: 12px; background: #2d2d2d; border-bottom: 1px solid var(--border); color: #888; }
        
        /* 左侧文件树 */
        #fileManager { padding: 10px; font-size: 13px; overflow-y: auto; color: #d4d4d4; }
        .file-item { padding: 4px; cursor: pointer; border-bottom: 1px solid #333; }
        .file-item:hover { background: #2a2d2e; }

        /* 中部区域分屏 */
        .main-area { display: grid; grid-template-rows: 1fr 1fr; gap: 2px; background: var(--bg); }
        #editorArea { padding: 10px; font-size: 14px; color: #9cdcfe; } /* Monaco 预留位 */
        #terminalWrapper { padding: 5px; background: #000; }
        
        /* 右侧仪表盘 */
        .dashboard { padding: 10px; overflow-y: auto; }
        .chart-box { height: 150px; width: 100%; margin-bottom: 15px; }

        /* 极简登录层 */
        #loginOverlay { position: absolute; inset: 0; background: rgba(0,0,0,0.9); display: flex; justify-content: center; align-items: center; z-index: 999; }
        .login-box { display: flex; gap: 10px; }
        input { background: #333; color: #fff; border: 1px solid #555; padding: 8px; border-radius: 4px;}
        button { background: #007acc; color: #fff; border: none; padding: 8px 15px; cursor: pointer; font-weight: bold; border-radius: 4px;}
    </style>
</head>
<body>
    <div id="loginOverlay">
        <div class="login-box">
            <input type="text" id="host" placeholder="IP" value="127.0.0.1">
            <input type="text" id="user" placeholder="Root" value="root">
            <input type="password" id="pass" placeholder="Password">
            <button onclick="connect()">Connect Engine</button>
        </div>
    </div>

    <div class="header">🚀 OS Terminal (Framework Mode)</div>
    
    <div class="desktop">
        <div class="panel">
            <div class="panel-title">/root 资源管理器 (SFTP)</div>
            <div id="fileManager">等待连接数据...</div>
        </div>

        <div class="main-area">
            <div class="panel" style="border-bottom: 2px solid #007acc;">
                <div class="panel-title">Editor / Preview (Monaco 预留位)</div>
                <div id="editorArea">// [准备就绪] 后续可在此挂载 Monaco Editor 渲染远端代码文件...</div>
            </div>
            <div class="panel">
                <div class="panel-title">Terminal</div>
                <div id="terminalWrapper" style="flex:1;"></div>
            </div>
        </div>

        <div class="panel dashboard">
            <div class="panel-title">系统状态 (ECharts)</div>
            <div id="cpuChart" class="chart-box"></div>
            <div id="netChart" class="chart-box"></div>
        </div>
    </div>

    <script>
        // 初始化 Terminal
        const term = new Terminal({ cursorBlink: true, theme: { background: '#000' }});
        const fitAddon = new FitAddon.FitAddon();
        term.loadAddon(fitAddon);
        term.open(document.getElementById('terminalWrapper'));
        setTimeout(() => fitAddon.fit(), 200);
        window.onresize = () => fitAddon.fit();

        // 初始化 ECharts (以CPU多核雷达图为例)
        const cpuChart = echarts.init(document.getElementById('cpuChart'), 'dark');
        cpuChart.setOption({
            backgroundColor: 'transparent',
            title: { text: 'CPU Cores', textStyle: { fontSize: 12, color: '#888' } },
            xAxis: { type: 'category', data: ['Core1', 'Core2', 'Core3', 'Core4'], show: false },
            yAxis: { type: 'value', max: 100, show: false },
            series: [{ type: 'bar', data: [0,0,0,0], itemStyle: { color: '#0f0' } }]
        });

        const netChart = echarts.init(document.getElementById('netChart'), 'dark');
        netChart.setOption({
            backgroundColor: 'transparent',
            title: { text: 'Network Traffic', textStyle: { fontSize: 12, color: '#888' } },
            xAxis: { type: 'category', data: ['','','','',''] },
            yAxis: { type: 'value', show: false },
            series: [{ type: 'line', data: [0,0,0,0,0], areaStyle: {}, smooth: true }]
        });
        let netData = [0,0,0,0,0];

        let ws = null;

        function connect() {
            document.getElementById('loginOverlay').style.display = 'none';
            ws = new WebSocket(window.location.protocol === 'https:' ? 'wss://' : 'ws://' + window.location.host + '/');
            
            term.onData(data => { 
                if(ws.readyState === WebSocket.OPEN) ws.send(JSON.stringify({type: 'TERMINAL_INPUT', data})); 
            });

            ws.onopen = () => {
                ws.send(JSON.stringify({
                    host: document.getElementById('host').value,
                    port: 22,
                    username: document.getElementById('user').value,
                    password: document.getElementById('pass').value
                }));
            };

            ws.onmessage = (e) => {
                const packet = JSON.parse(e.data);
                
                // 数据路由分发机制 (全新架构)
                switch(packet.type) {
                    case 'SYSTEM':
                    case 'TERMINAL':
                        term.write(packet.data || packet.msg);
                        break;
                    case 'SFTP_INIT':
                        // 渲染左侧文件树
                        document.getElementById('fileManager').innerHTML = packet.files.map(f => `<div class="file-item">📄 ${f}</div>`).join('');
                        break;
                    case 'MONITOR':
                        // 动态更新右侧 ECharts
                        cpuChart.setOption({ series: [{ data: packet.cpuCores }]});
                        netData.shift(); netData.push(packet.netDown);
                        netChart.setOption({ series: [{ data: netData }]});
                        break;
                }
            };
        }
    </script>
</body>
</html>
